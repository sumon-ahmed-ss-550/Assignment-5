<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>
    <!-- font awesome link -->
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/fontawesome.min.css" />
    <!-- daisyUi link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- css link -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body class="lg:pt-20 lg:w-[743px] mx-auto">
    <!-- main section -->
    <main class="max-w-[520px] rounded-lg bg-white lg:shadow-lg lg:p-6 mx-auto">
      <!-- top area -->
      <div>
        <div class="flex justify-center items-center">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <div class="text-center">
          <h1 class="font-semibold text-2xl text-[#1F2937]">
            GitHub Issues Tracker
          </h1>
          <p class="text-base text-[#64748B]">Sign in to manage your issues</p>
        </div>
      </div>

      <!-- center area -->
      <div class="mx-auto">
        <div class="card-body flex justify-center">
          <fieldset class="fieldset">
            <label class="label text-base">Username</label>
            <div>
              <input
                id="input-user-name"
                type="text"
                class="input w-full focus:outline-none focus:border-neutral-500"
                placeholder="Enter Username"
              />
              <p id="defaultUser" class="text-[14px] text-[#4A00FF]">
                Default: admin
              </p>
            </div>
            <label class="label text-base">Password</label>
            <div>
              <input
                id="input-password"
                type="password"
                class="input w-full focus:outline-none focus:border-neutral-500"
                placeholder="Enter Password"
              />
              <p id="defaultPass" class="text-[14px] text-[#4A00FF]">
                Default: admin123
              </p>
            </div>
            <button id="sign-in-btn" class="btn btn-primary mt-4">
              Sign In
            </button>
          </fieldset>
        </div>
      </div>

      <!-- bottom area -->
      <div>
        <div class="text-center mb-6">
          <p class="text-base text-[#1F2937]">OR</p>
        </div>

        <div class="text-center mb-2">
          <p class="text-[14px] text-[#64748B]">Demo Credentials:</p>
        </div>

        <div class="text-center p-6 bg-[#F8FAFC] rounded-lg">
          <p class="text-base text-[#1F2937]">Username: admin</p>
          <p class="text-base text-[#1F2937]">Password: admin123</p>
        </div>
      </div>
    </main>

    <!-- font awesome link -->
    <script src="./scripts/all.min.js"></script>
    <script src="./scripts/fontawesome.min.js"></script>
    <!-- tailwindcss link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Js link -->
    <script src="./scripts/loginForm.js"></script>
  </body>
</html>
