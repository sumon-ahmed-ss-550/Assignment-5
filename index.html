<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github issue tracker</title>
    <!-- font awesome link -->
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/fontawesome.min.css" />
    <!-- daisyUi link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- css link -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body class="geist-font">
    <!-- admin panel -->
    <section class="flex justify-center items-center min-h-screen">
      <div class="w-full max-w-[520px] bg-white rounded-lg p-8 shadow-lg">
        <div class="flex justify-center">
          <div class="text-center space-y-6">
            <img
              class="mx-auto w-[100px] h-[100px]"
              src="./assets/github-logo.png"
              alt=""
            />
            <div>
              <h2 class="font-semibold text-2xl text-[#1F2937] mb-1">
                GitHub Issues Tracker
              </h2>
              <span class="font-normal text-base text-[#64748B]"
                >Sign in to manage your issues</span
              >
            </div>
          </div>
        </div>

        <!-- form -->
        <form id="loginForm" action="" class="mb-6">
          <div class="space-y-4 mb-6">
            <div class="space-y-2">
              <label class="font-medium text-[16px] text-[#1F2937]" for=""
                >Username</label
              >
              <div>
                <input
                  id="name"
                  class="w-full p-4 rounded-lg border-[#E4E4E7] font-normal text-base leading-4 text-[#64748B] mb-2"
                  type="text"
                  placeholder="Enter Username"
                  required
                />
                <span id="nameSpan" class="font-normal text-sm text-[#4A00FF]"
                  >Default: admin</span
                >
              </div>
            </div>

            <div class="space-y-2">
              <label class="font-medium text-[16px] text-[#1F2937]" for=""
                >Password</label
              >
              <div>
                <input
                  id="password"
                  class="w-full p-4 rounded-lg border-[#E4E4E7] font-normal text-base leading-4 text-[#64748B] mb-2"
                  type="password"
                  placeholder="Enter Password"
                  required
                />
                <span id="passSpan" class="font-normal text-sm text-[#4A00FF]"
                  >Default: admin123</span
                >
              </div>
            </div>
          </div>
          <button
            type="submit"
            class="w-full btn btn-primary font-semibold text-base p-4"
          >
            Sign In
          </button>
        </form>

        <div>
          <div class="flex items-center my-6">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="mx-4 text-gray-500 text-sm">OR</span>
            <div class="flex-grow border-t border-gray-300"></div>
          </div>
          <div class="text-center">
            <span class="font-normal text-sm text-[#64748B]"
              >Demo Credentials:</span
            >
            <div class="bg-[#F8FAFC] py-6 rounded-lg">
              <h3 class="font-semibold text-base">
                Username:<span class="font-normal">admin</span>
              </h3>
              <h3 class="font-semibold text-base">
                Password:<span class="font-normal">admin123</span>
              </h3>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- font awesome link -->
    <script src="./js/all.min.js"></script>
    <script src="./js/fontawesome.min.js"></script>
    <!-- tailwindcss link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- js link -->
    <script src="./js/script.js"></script>
  </body>
</html>
