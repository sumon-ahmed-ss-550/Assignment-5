<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github issue tracker</title>
    <!-- font awesome link -->
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/fontawesome.min.css" />
    <!-- daisyUi link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- css link -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <header class="bg-base-100 shadow-sm">
      <div
        class="max-w-[1440px] mx-auto px-4 py-5 md:flex justify-between items-center"
      >
        <div class="flex justify-center items-center gap-2 mb-4 md:mb-0">
          <img class="w-9" src="./assets/github-logo.png" alt="" />
          <span class="font-semibold text-2xl text-[#1F2937]"
            >GitHub Issues Tracker</span
          >
        </div>

        <form action="" class="flex justify-center items-center gap-4">
          <input type="search" placeholder="Search issues..." class="input" />
          <button type="submit" class="btn btn-primary">New Issue</button>
        </form>
      </div>
    </header>

    <!-- font awesome link -->
    <script src="./js/all.min.js"></script>
    <script src="./js/fontawesome.min.js"></script>
    <!-- tailwindcss link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- js link -->
    <script src="./js/script.js"></script>
  </body>
</html>
