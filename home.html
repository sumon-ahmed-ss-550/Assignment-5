    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>

    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/fontawesome.min.css" />
    <!-- daisyUi link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

      <div class="navbar flex-col md:flex-row bg-base-100 shadow-sm lg:px-20">
        <div class="flex-1 mb-6 md:mb-0">
          <div class="flex gap-1 items-center">
            <img src="./assets/github-logo.png" alt="" class="w-9" />
            <a class="text-[18px] font-bold text-[#1F2937]"
              >GitHub Issues Tracker</a
            >
          </div>
        </div>

        <div class="flex">
          <div class="join gap-2">
            <input
              id="input-search"
              type="search"
              placeholder="Search"
              class="input input-bordered focus:outline-none rounded focus:border-purple-700 w-full md:w-auto"
            />
            <button onclick="searchItemInApi()" class="btn btn-primary rounded">
              <i class="fa-solid fa-plus"></i>New Issue
            </button>
          </div>

            <div

            <ul

                class="input focus:border-purple-700 rounded-sm input-bordered focus:outline-none w-24 w-full"

        </div>
      </div>
    </header>

    <!-- Main Section  -->
    <main
      class="w-full sm:px-6 lg:w-[1110px] lg:px-0 mx-auto mt-4 sm:mt-[60px] invisible spin"
    >
      <!-- Btn container  -->

      <section class="w-full">
        <div
          id="btn-container"
          class="flex justify-start gap-2 bg-white p-6 rounded-lg shadow-md"
        >
          <button
            onclick="toggleBtn('all-btn')"
            id="all-btn"
            class="btn active-btn w-24"
          >
            All
          </button>
          <button
            onclick="toggleBtn('open-btn')"
            id="open-btn"
            class="btn inactive-btn w-24"
          >
            Open
          </button>
          <button
            onclick="toggleBtn('closed-btn')"
            id="closed-btn"
            class="btn inactive-btn w-24"
          >
            Closed
          </button>
        </div>
      </section>

      <!-- Issue section  -->

      <section
        class="flex gap-5 justify-between items-center shadow-md bg-white p-6 rounded-t-lg mt-4"
      >
        <div class="flex gap-2 items-center">
          <div class="">
            <img src="./assets/Aperture.png" alt="" class="w-[50px]" />
          </div>
          <div class="">
            <div class="flex items-center gap-2">
              <span
                class="text-xl font-semibold text-[#1F2937]"
                data-id="all-count-div"
                id="all-issue"
                >0</span
              >
              <span
                class="hidden text-xl font-semibold text-[#1F2937]"
                data-id="open-count-div"
                id="open-count"
                >0</span
              >
              <span
                class="hidden text-xl font-semibold text-[#1F2937]"
                data-id="closed-count-div"
                id="closed-count"
                >0</span
              >
              <h1 class="text-xl font-semibold text-[#1F2937]">Issues</h1>
            </div>

            <p class="text-base text-[#64748B]">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="md:flex gap-4">
          <div class="flex items-center gap-1">
            <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
            <p class="font-medium text-[#1F2937]">Open</p>
          </div>
          <div class="flex items-center gap-1">
            <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
            <p class="font-medium text-[#1F2937]">Closed</p>
          </div>
        </div>
      </section>
      <!-- Card section  -->

      <section class="p-4 sm:p-6 bg-[#fbfbfbd9] w-full mx-auto shadow-md">
        <div
          id="card-container"
          class="grid grid-cols-1 mx-auto justify-items-center sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"
        ></div>
      </section>
    </main>

    <!-- spinner -->
    <div
      id="spinner-container"
      class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2"
    >
      <span class="loading loading-spinner loading-xl"></span>
    </div>

    <!-- modal -->
    <dialog id="display_modal" data-id="Modal-container" class="modal"></dialog>

    <!-- footer-->
    <footer class="invisible spin"></footer>

    <!-- font awesome link -->
    <script src="./scripts/all.min.js"></script>
    <script src="./scripts/fontawesome.min.js"></script>
    <!-- tailwindcss link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Js -->
    <script src="./scripts/dasboard.js"></script>
  </body>
</html>
